name: "Vprofile IAC"
on: 
  push:
    branches:
      - main
      - stage
    paths:
      - terraform/**
  pull_request:
    branches:
      - main
    paths:
      - terraform/**

env:
  AWS_ACCESS_KEY_ID: ${{secrets.AWS_ACCESS_KEY_ID}}
  AWS_SECRET_ACCESS_KEY: ${{secrets.AWS_SECRET_ACCESS_KEY}}
  BUCKET_TF_STATE: ${{secrets.BUCKET_TF_STATE}}
  AWS_REGION: us-east-2
  EKS_CLUSTER: vprofile-eks

jobs:
  terraform:
    name: "Apply terraform code changes"
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ./terraform
    steps: 
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Terraform with specified version on the runner
        uses: hashicorp/setup-terraform@v2
        #with:
        #  terraform-version: 1.6.3

      - name: Terraform init
        id: init
        run: terraform init -backend-config="bucket=$BUCKET_TF_STATE"

      - name: Terraform format
        id: fmt
        run: terraform fmt -check

      - name: Terraform validate
        id: validate
        run: terraform validate

      - name: Run Checkov
        run: |
          pip install checkov
          checkov -d . --skip-check CKV_TF_1

      - name: Install tfsec
        run: |
          curl -L https://github.com/aquasecurity/tfsec/releases/latest/download/tfsec-linux-amd64 -o tfsec
          chmod +x tfsec
          sudo mv tfsec /usr/local/bin/tfsec

      - name: Run tfsec
        run: tfsec . --soft-fail

      - name: Terraform plan
        id: plan
        run: terraform plan -no-color -input=false -out planfile
        continue-on-error: true

      - name: Terraform plan status
        if: steps.plan.outcome == 'failure'
        run: exit 1
      
      - name: Export plan to JSON
        id: show
        run: terraform show -json planfile > plan.json

      - name: Upload Terraform plan JSON
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-json
          path: ./terraform/plan.json

      - name: Install OPA
        run: |
          curl -L -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x opa
          sudo mv opa /usr/local/bin/opa

      - name: Debug OPA input
        run: |
          grep -n '"type":"aws_eks_cluster"' plan.json | head
          grep -n '"public_access_cidrs"' plan.json | head
          grep -n '"endpoint_public_access"' plan.json | head
          grep -n '"cidr_blocks"' plan.json | head

      - name: Debug plan values for OPA
        run: |
          echo "---- endpoint_public_access ----"
          jq '.resource_changes[] | select(.type=="aws_eks_cluster") | .change.after.vpc_config' plan.json

          echo "---- public_access_cidrs ----"
          jq '.resource_changes[] | select(.type=="aws_eks_cluster") | .change.after.vpc_config[]?.public_access_cidrs' plan.json

          echo "---- sg egress ----"
          jq '.resource_changes[] | select(.type=="aws_security_group_rule") | {address: .address, after: .change.after}' plan.json

      - name: Debug OPA expressions
        run: |
          echo "---- OPA test 1 ----"
          opa eval -f pretty -i plan.json '.resource_changes[_].type'

          echo "---- OPA test 2 ----"
          opa eval -f pretty -i plan.json 'input.resource_changes[_].type == "aws_eks_cluster"'

          echo "---- OPA test 3 ----"
          opa eval -f pretty -i plan.json 'input.resource_changes[_].change.after.vpc_config'

          echo "---- OPA test 4 ----"
          opa eval -f pretty -i plan.json 'input.resource_changes[_].change.after.vpc_config[_].endpoint_public_access'

          echo "---- OPA test 5 ----"
          opa eval -f pretty -i plan.json 'input.resource_changes[_].change.after.vpc_config[_].public_access_cidrs[_]'

          echo "---- OPA test 6 ----"
          opa eval -f pretty -i plan.json 'input.resource_changes[_].change.after.cidr_blocks[_]'

      - name: Run OPA policy check
        run: |
          opa eval -f pretty -i plan.json -d ../opa/policy.rego "data.terraform.security.deny"
        continue-on-error: true

      - name: Terraform Apply
        id: apple
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve -input=false -parallelism=1 planfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
     
      - name: Get Kube config file
        id: getconfig
        if: steps.apple.outcome == 'success'
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }} 

      - name: Install Ingress controller
        if: steps.apple.outcome == 'success' && steps.getconfig.outcome == 'success'
        run: kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.1.3/deploy/static/provider/aws/deploy.yaml


      